<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediExplain — AI Medical Report Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{--primary:#1a3a6b;--accent:#1a3a6b;--bg:#f0f4ff;--card:#ffffff;--border:#d1d9f0;--text:#1e293b;--muted:#64748b;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    header{background:var(--primary);color:#fff;padding:18px 32px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.25);}
    header .logo{font-size:2rem;}
    header h1{font-size:1.5rem;font-weight:700;}
    header p{font-size:.85rem;opacity:.8;margin-top:2px;}
    .container{max-width:960px;margin:0 auto;padding:28px 20px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:0 2px 10px rgba(30,58,107,.07);margin-bottom:24px;}
    .card h2{font-size:1.05rem;color:var(--primary);margin-bottom:14px;}
    .examples{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
    .example-btn{background:#eef3fb;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:.8rem;color:var(--primary);cursor:pointer;transition:background .2s;}
    .example-btn:hover{background:#d6e4fa;}
    textarea{width:100%;min-height:110px;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:.95rem;font-family:inherit;resize:vertical;color:var(--text);}
    textarea:focus{outline:none;border-color:var(--accent);}
    .options-row{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
    .opt-group{display:flex;flex-direction:column;gap:4px;}
    .opt-group label{font-size:.78rem;color:var(--muted);font-weight:600;}
    select{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.88rem;font-family:inherit;color:var(--text);background:#fff;}
    .submit-btn{margin-top:18px;width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;}
    .submit-btn:hover{background:#1a5dc8;}
    .submit-btn:disabled{background:#94a3b8;cursor:not-allowed;}
    .badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
    .badge{display:flex;align-items:center;gap:7px;border-radius:8px;padding:7px 14px;font-size:.87rem;font-weight:600;border:1.5px solid;}
    .badge.normal{background:#dcfce7;border-color:#86efac;color:#15803d;}
    .badge.low,.badge.high{background:#fef9c3;border-color:#fde047;color:#854d0e;}
    .badge.critically-low,.badge.critically-high{background:#fee2e2;border-color:#fca5a5;color:#991b1b;}
    .badge.unknown{background:#f1f5f9;border-color:#cbd5e1;color:#475569;}
    .result-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;box-shadow:0 2px 10px rgba(30,58,107,.07);}
    .result-card h2{font-size:1.05rem;color:var(--primary);margin-bottom:16px;}
    .md-output h2{font-size:1.1rem;color:var(--primary);margin:20px 0 8px;border-bottom:2px solid var(--border);padding-bottom:4px;}
    .md-output h3{font-size:.95rem;color:#1e40af;margin:14px 0 6px;}
    .md-output p{margin-bottom:10px;line-height:1.65;font-size:.93rem;}
    .md-output ul{padding-left:20px;margin-bottom:10px;}
    .md-output li{margin-bottom:4px;font-size:.93rem;line-height:1.6;}
    .md-output strong{color:var(--primary);}
    .md-output hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
    .spinner-wrap{display:none;justify-content:center;align-items:center;padding:40px;flex-direction:column;gap:14px;color:var(--muted);font-size:.9rem;}
    .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-box{background:#fee2e2;border:1.5px solid #fca5a5;border-radius:10px;padding:14px 18px;color:#991b1b;font-size:.9rem;}
    footer{text-align:center;padding:24px;font-size:.8rem;color:var(--muted);}
  </style>
</head>
<body>
<header>
  <div class="logo">🩺</div>
  <div><h1>MediExplain</h1><p>AI-Powered Medical Laboratory Report Explainer </p></div>
</header>
<div class="container">
  <div class="card">
    <h2>📋 Enter Your Lab Result(s)</h2>
    <div class="examples">
      <span style="font-size:.78rem;color:var(--muted);align-self:center;">Try:</span>
      <button class="example-btn" onclick="setEx(0)">CBC Report</button>
      <button class="example-btn" onclick="setEx(1)">Lipid Panel</button>
      <button class="example-btn" onclick="setEx(2)">Liver Function</button>
      <button class="example-btn" onclick="setEx(3)">HbA1c</button>
      <button class="example-btn" onclick="setEx(4)">Thyroid</button>
    </div>
    <textarea id="q" placeholder="Type your lab values, e.g.:
My Hemoglobin is 10.2 g/dL (normal range 12-16)
WBC = 12.5, RBC = 3.8, Platelets = 450
HbA1c = 8.1%"></textarea>
    <div class="options-row">
      <div class="opt-group">
        <label>BIOLOGICAL SEX</label>
        <select id="sex">
          <option value="both">Not specified</option>
          <option value="female">Female</option>
          <option value="male">Male</option>
        </select>
      </div>
      <div class="opt-group">
        <label>AI MODEL</label>
        <select id="model">
          {% for m in models %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <button class="submit-btn" id="btn" onclick="explain()">🔍 Explain My Results</button>
  </div>
  <div id="out"></div>
</div>
<script>
const EX=[
  "My CBC: Hemoglobin = 10.2 g/dL, WBC = 12.5, Platelets = 450\nNormal ranges: Hgb 12-16, WBC 4.5-11, Platelets 150-400",
  "Cholesterol = 230 mg/dL, LDL = 155 mg/dL, HDL = 38 mg/dL, Triglycerides = 210 mg/dL",
  "ALT = 85 U/L, AST = 72 U/L, ALP = 180 U/L, Total Bilirubin = 1.8 mg/dL",
  "HbA1c = 8.1%. Normal range is below 5.7%.",
  "TSH = 0.08 mIU/L, Free T4 = 2.4 ng/dL. Normal TSH: 0.4-4.0"
];
function setEx(i){document.getElementById('q').value=EX[i];}
async function explain(){
  const q=document.getElementById('q').value.trim();
  const sex=document.getElementById('sex').value;
  const model=document.getElementById('model').value;
  const btn=document.getElementById('btn');
  const out=document.getElementById('out');
  if(!q){alert('Please enter your lab results.');return;}
  btn.disabled=true;btn.textContent='⏳ Analysing...';
  out.innerHTML='<div class="spinner-wrap" style="display:flex"><div class="spinner"></div><span>MediExplain is analysing your results…</span></div>';
  try{
    const res=await fetch('/explain',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,sex,model})});
    const data=await res.json();
    if(!data.success){out.innerHTML=`<div class="error-box">⚠️ ${data.message}</div>`;return;}
    const emojiMap={'NORMAL':'🟢','LOW':'🟡','HIGH':'🟡','CRITICALLY LOW':'🔴','CRITICALLY HIGH':'🔴','UNKNOWN':'⚪'};
    let badges='';
    for(const t of data.tests){
      const cls=t.status.toLowerCase().replace(/ /g,'-');
      badges+=`<div class="badge ${cls}">${emojiMap[t.status]||'⚪'} ${t.test_name}: ${t.status}</div>`;
    }
    out.innerHTML=`<div class="result-card"><h2>📊 Your Results Summary</h2><div class="badges">${badges}</div><div class="md-output">${marked.parse(data.markdown||'')}</div></div>`;
  }catch(e){out.innerHTML=`<div class="error-box">⚠️ ${e.message}</div>`;}
  finally{btn.disabled=false;btn.textContent='🔍 Explain My Results';}
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('q').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')explain();});
});
</script>
</body>
</html>
